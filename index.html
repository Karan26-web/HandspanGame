<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Handspan Game</title>
  <link rel="preload" href="assets/Table.svg" as="image" />
  <link rel="preload" href="assets/gogo.png" as="image" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ============================================================
       STAGE
       The whole game lives inside a fixed 1280x720 design surface
       that is uniformly scaled to fit any viewport (aspect locked).
       ============================================================ -->
  <div id="viewport">
    <div id="stage">
      <!-- Uniform room background (assets/Bgm.png) used across every screen -->
      <div id="bg" class="bg"></div>

      <!-- The scene root. Each STATE renders its own DOM here. -->
      <div id="scene" class="scene"></div>

      <!-- Global FX layers (sparkles / confetti / particles) -->
      <div id="fx" class="fx-layer"></div>

      <!-- Dim + blur overlay used to spotlight tutorial targets -->
      <div id="spotlight" class="spotlight hidden"></div>
    </div>
  </div>

  <!-- Tap-to-start gate (PreLBD title art) so we can unlock the audio context -->
  <div id="boot" class="boot">
    <div class="boot__card">
      <button type="button" id="bootBtn" class="btn btn--play boot__btn">▶ Tap to Play</button>
    </div>
  </div>

  <!-- Scripts loaded in dependency order. Plain scripts (no ES modules)
       so the game runs straight from index.html on file:// too. They
       all hang off a single global namespace: window.HS -->
  <script src="audio.js"></script>
  <script src="animations.js"></script>
  <script src="ui.js"></script>
  <script src="tutorial.js"></script>
  <script src="rounds.js"></script>
  <script src="game.js"></script>
  <script src="script.js"></script>
</body>
</html>
